domain_id: circuit
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: CIR-001
    section: "Circuit Statement"
    summary: "Prove membership, aggregation, and majority"
    status: complete
    spec_ref: "docs/design/requirements/circuit/CIR-001.md"
    tests:
      - tests/vv_req_cir_001.rs
    notes: "ConsensusCircuit struct in src/prover/circuit.rs with public inputs and private witnesses"

  - id: CIR-002
    section: "Constraints"
    summary: "Merkle membership verification per signer"
    status: complete
    spec_ref: "docs/design/requirements/circuit/CIR-002.md"
    tests:
      - tests/vv_req_cir_002.rs
    notes: "prove_validator() and verify_for_pubkey() methods for Merkle proof verification"

  - id: CIR-003
    section: "Constraints"
    summary: "G1 sum equals agg_signers — enforced via non-native G1 arithmetic"
    status: verified
    spec_ref: "docs/design/requirements/circuit/CIR-003.md"
    tests:
      - tests/vv_req_cir_003.rs
      - tests/vv_req_cir_003_constraint.rs::vv_req_cir_003_correct_aggregate_succeeds
      - tests/vv_req_cir_003_constraint.rs::vv_req_cir_003_wrong_aggregate_fails
      - tests/vv_req_cir_003_constraint.rs::vv_req_cir_003_phantom_majority_blocked
      - tests/vv_req_cir_003_constraint.rs::vv_req_cir_003_single_signer
      - tests/vv_req_cir_003_constraint.rs::vv_req_cir_003_empty_pubkeys_skips_constraint
    notes: "Non-native G1 arithmetic in src/prover/g1_gadget.rs. enforce_aggregate_key() decompresses pubkeys to (x,y) Fq coordinates, verifies on-curve, accumulates via constrained affine addition, enforces sum == agg_signers. Off-chain aggregate in src/prover/aggregate.rs."

  - id: CIR-004
    section: "Constraints"
    summary: "Majority threshold 2k > count"
    status: complete
    spec_ref: "docs/design/requirements/circuit/CIR-004.md"
    tests:
      - tests/vv_req_cir_004.rs
    notes: "is_majority() and minimum_signers() functions in src/prover/majority.rs"

  - id: CIR-005
    section: "Public Inputs"
    summary: "6 public inputs in fixed order"
    status: complete
    spec_ref: "docs/design/requirements/circuit/CIR-005.md"
    tests:
      - tests/vv_req_cir_005.rs
    notes: "PUBLIC_INPUT_COUNT constant and public_input_index module in src/prover/circuit.rs"

  - id: CIR-006
    section: "Parameters"
    summary: "MAX_SIGNERS and TREE_DEPTH fixed at setup"
    status: complete
    spec_ref: "docs/design/requirements/circuit/CIR-006.md"
    tests:
      - tests/vv_req_cir_006.rs
    notes: "MAX_SIGNERS=20,000 and TREE_DEPTH=32 as compile-time constants"
