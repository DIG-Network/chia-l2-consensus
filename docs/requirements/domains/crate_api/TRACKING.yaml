  - id: API-008
    section: "Return-Not-Submit Pattern"
    summary: "All bundle methods return SpendBundle; crate never broadcasts"
    status: verified
    spec_ref: "docs/requirements/domains/crate_api/specs/API-008.md"
    tests:
      - tests/vv_req_api_008.rs (10 tests)
    notes: "No push_tx/send_transaction/submit_spend_bundle in src/ code (comments OK). build_checkpoint/register_validator/recover_collateral/release_collateral all return ConsensusResult<SpendBundle>. Method named build_checkpoint not submit_checkpoint. Client docs pattern."
