  - id: WDC-004
    section: "Registration Coin Integration"
    summary: "Registration coin creates delay coin, not destination coin"
    status: verified
    spec_ref: "docs/requirements/domains/withdraw_delay/specs/WDC-004.md"
    tests:
      - tests/vv_req_wdc_004.rs (19 tests)
    notes: "Registration coin: +2 curried params, CREATE_COIN → delay coin hash via curry_tree_hash. Network coin: +2 curried params for reg coin hash. Cross-impl: CLVM delay hash matches Rust curry_tree_hash. All existing tests updated for new param counts (harness, NET-006, REG-001,003,004,005,007,010, SEC-008)."

  - id: WDC-005
    section: "Driver and API"
    summary: "release_collateral() builds SpendBundle for delay coin"
    status: verified
    spec_ref: "docs/requirements/domains/withdraw_delay/specs/WDC-005.md"
    tests:
      - tests/vv_req_wdc_005.rs (8 tests)
    notes: "release_collateral() on ConsensusClient + withdraw_delay_puzzle_hash() + release_collateral() driver. All return SpendBundle, no broadcast. recover_collateral() docs updated for two-phase flow. Implementations are todo!() stubs — RPC-004 will fill them."

  - id: WDC-006
    section: "Configuration"
    summary: "NetworkConfig: withdraw_delay_blocks + mod_hash"
    status: verified
    spec_ref: "docs/requirements/domains/withdraw_delay/specs/WDC-006.md"
    tests:
      - tests/vv_req_wdc_006.rs (7 tests)
    notes: "NetworkConfig +2 fields: withdraw_delay_blocks (u64, default 24000), withdraw_delay_mod_hash (Bytes32). JSON round-trip verified. deploy_both_singletons() populates from compiled artifact. 5 existing test files updated for new fields."

  - id: WDC-007
    section: "Permissionless Release"
    summary: "No AGG_SIG; anyone can release after delay"
    status: verified
    spec_ref: "docs/requirements/domains/withdraw_delay/specs/WDC-007.md"
    tests:
      - tests/vv_req_wdc_007.rs (8 tests)
    notes: "No AGG_SIG_ME (50), no AGG_SIG_UNSAFE (49), no ANY AGG_SIG variant (43-50). Only opcodes 82+51 emitted. Destination always matches curried value across 4 test vectors. Source has zero AggSig* references."

  - id: WDC-008
    section: "CLVM Execution Tests"
    summary: "Dedicated CLVM tests for WDC-001-003"
    status: verified
    spec_ref: "docs/requirements/domains/withdraw_delay/specs/WDC-008.md"
    tests:
      - tests/vv_req_wdc_008.rs (11 tests)
    notes: "11 CLVM execution tests covering WDC-001 (load, 2 conditions, no passthrough, diff params), WDC-002 (opcode 82, delay matches at 5 values, delay=0), WDC-003 (destination matches, amount at 3 values, cross-impl curry_tree_hash). All use compiled .hex artifact."

  - id: WDC-009
    section: "E2E Simulator Test"
    summary: "Full two-phase recovery lifecycle + failure before delay"
    status: verified
    spec_ref: "docs/requirements/domains/withdraw_delay/specs/WDC-009.md"
    tests:
      - tests/vv_req_wdc_009.rs::vv_req_wdc_009_two_phase_collateral_recovery
      - tests/vv_req_wdc_009.rs::vv_req_wdc_009_spec_file_exists
    notes: "Full E2E: deploy singletons → register validator → cross-coin collateral recovery (checkpoint query + registration coin) → delay coin created (not direct destination) → spend delay coin → destination coin created with full collateral. Simulator does NOT enforce ASSERT_HEIGHT_RELATIVE (Chia node does)."

  - id: WDC-010
    section: "Destination Hint Memo"
    summary: "Registration coin memo = conflict-resistant hint; delay coin memo = DIG Network Collateral Release"
    status: verified
    spec_ref: "docs/requirements/domains/withdraw_delay/specs/WDC-010.md"
    tests:
      - tests/vv_req_wdc_010.rs (10 tests)
    notes: "Registration coin: hint = sha256(CHECKPOINT_SINGLETON_ID + dest), puzzle-enforced, cross-impl verified, different dest/ckpt → different hints. Delay coin: memo = 'DIG Network Collateral Release' verified in CLVM output. Both puzzles compile with memos."
