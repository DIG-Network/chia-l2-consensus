  - id: WDC-002
    section: "Time Lock"
    summary: "ASSERT_HEIGHT_RELATIVE enforces block delay"
    status: verified
    spec_ref: "docs/requirements/domains/withdraw_delay/specs/WDC-002.md"
    tests:
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_default_delay_is_24000_blocks
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_clvm_default_delay_value
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_clvm_delay_zero
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_clvm_delay_one
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_clvm_delay_two
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_clvm_delay_10
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_clvm_delay_256
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_clvm_delay_4608
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_clvm_large_delay
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_clvm_u32_max_delay
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_different_delays_different_conditions
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_same_delay_deterministic
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_assert_height_is_first_condition
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_assert_height_has_one_arg
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_no_bypass
      - tests/vv_req_wdc_002.rs::vv_req_wdc_002_spec_file_exists
    notes: "16 CLVM execution tests. Opcode 82 emitted with exact delay value at all tested points: 0, 1, 2, 10, 256, 4608, 24000, 100000, u32::MAX. Different delays → different conditions. No bypass path. Simulator-level height enforcement not available in chia-sdk-test 0.18 — ASSERT_HEIGHT_RELATIVE is emitted correctly; Chia full node enforces it at block inclusion."

