domain_id: smt
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: SMT-001
    section: "Tree Structure"
    summary: "Fixed depth TREE_DEPTH sparse Merkle tree"
    status: implemented
    spec_ref: "docs/requirements/domains/smt/specs/SMT-001.md"
    tests:
      - tests/vv_req_smt_001.rs
    notes: "TREE_DEPTH=32, EMPTY_LEAF=sha256([0;48]), compute_empty_nodes(), SparseMerkleTree with HashMap storage"

  - id: SMT-002
    section: "Slot Assignment"
    summary: "Deterministic slot from sha256(pubkey)"
    status: implemented
    spec_ref: "docs/requirements/domains/smt/specs/SMT-002.md"
    tests:
      - tests/vv_req_smt_002.rs
    notes: "compute_slot() function: sha256(pubkey) -> first 8 bytes BE u64 -> mod 2^32"

  - id: SMT-003
    section: "Leaf Values"
    summary: "sha256(pubkey) or EMPTY_LEAF_HASH"
    status: implemented
    spec_ref: "docs/requirements/domains/smt/specs/SMT-003.md"
    tests:
      - tests/vv_req_smt_003.rs
    notes: "active_leaf() = sha256(pubkey), EMPTY_LEAF = sha256([0;48]), insert_validator/remove_validator convenience methods"

  - id: SMT-004
    section: "Proof Format"
    summary: "TREE_DEPTH siblings, left-first ordering"
    status: implemented
    spec_ref: "docs/requirements/domains/smt/specs/SMT-004.md"
    tests:
      - tests/vv_req_smt_004.rs
    notes: "MerkleProof with verify(), exactly 32 siblings, left-child-first hash convention"

  - id: SMT-005
    section: "Cross-Implementation"
    summary: "Rust and CLVM/Rue produce identical roots and proofs"
    status: verified
    spec_ref: "docs/requirements/domains/smt/specs/SMT-005.md"
    tests:
      - tests/vv_req_smt_005.rs (12 Rust canonical vector tests)
      - tests/vv_req_smt_005_cross_impl.rs::vv_req_smt_005_cross_impl_single_validator_membership
      - tests/vv_req_smt_005_cross_impl.rs::vv_req_smt_005_cross_impl_non_membership_proof
      - tests/vv_req_smt_005_cross_impl.rs::vv_req_smt_005_cross_impl_multiple_validators
      - tests/vv_req_smt_005_cross_impl.rs::vv_req_smt_005_cross_impl_empty_tree_root
      - tests/vv_req_smt_005_cross_impl.rs::vv_req_smt_005_cross_impl_announcement_hash
      - tests/vv_req_smt_005_cross_impl.rs::vv_req_smt_005_cross_impl_wrong_root_rejected
    notes: "Full cross-impl verified: Rust SparseMerkleTree proofs at TREE_DEPTH=32 accepted by compiled CLVM checkpoint puzzle. Tests cover membership, non-membership, multiple validators, empty tree, announcement hash, and wrong-root rejection."

  - id: SMT-006
    section: "Empty Tree Optimization"
    summary: "Precomputed empty subtree hashes"
    status: implemented
    spec_ref: "docs/requirements/domains/smt/specs/SMT-006.md"
    tests:
      - tests/vv_req_smt_006.rs
    notes: "EMPTY_TREE_ROOT constant, compute_empty_nodes(), O(n*depth) root computation"
