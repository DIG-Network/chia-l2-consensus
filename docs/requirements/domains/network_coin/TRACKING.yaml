      - tests/vv_req_net_002.rs::vv_req_net_002_puzzle_uses_sha256_for_message
      - tests/vv_req_net_002.rs::vv_req_net_002_puzzle_uses_register_prefix
      - tests/vv_req_net_002.rs::vv_req_net_002_puzzle_combines_prefix_and_pubkey
