    summary: "Network coin is singleton, one per L2 network"
    status: verified
    spec_ref: "docs/design/requirements/network_coin/NET-001.md"
    tests:
      - tests/vv_req_net_001.rs::vv_req_net_001_puzzle_compiles
      - tests/vv_req_net_001.rs::vv_req_net_001_puzzle_produces_clvm
      - tests/vv_req_net_001.rs::vv_req_net_001_puzzle_is_deterministic
      - tests/vv_req_net_001.rs::vv_req_net_001_puzzle_has_curried_params
      - tests/vv_req_net_001.rs::vv_req_net_001_puzzle_has_solution_params
      - tests/vv_req_net_001.rs::vv_req_net_001_puzzle_returns_conditions
      - tests/vv_req_net_001.rs::vv_req_net_001_singleton_wrapper_documented
      - tests/vv_req_net_001.rs::vv_req_net_001_inner_puzzle_pattern
      - tests/vv_req_net_001.rs::vv_req_net_001_clvm_loads_and_executes
