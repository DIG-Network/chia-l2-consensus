      - tests/vv_req_net_002.rs::vv_req_net_002_clvm_aggsigme_message_is_32_bytes
    notes: "12 source/format + 6 CLVM execution. AGG_SIG_ME pubkey == solution pubkey. Message = sha256('register' + pk) verified cross-impl with Rust sha2. Different pubkeys produce different messages in CLVM."

