      - tests/vv_req_net_004.rs::vv_req_net_004_curried_params_are_deployment_fixed
      - tests/vv_req_net_004.rs::vv_req_net_004_clvm_recreation_amount_is_one
      - tests/vv_req_net_004.rs::vv_req_net_004_clvm_recreation_hash_equals_inner_mod_hash
      - tests/vv_req_net_004.rs::vv_req_net_004_clvm_recreation_uses_real_mod_hash
