      - tests/vv_req_net_001.rs::vv_req_net_001_clvm_recreation_is_odd_amount
      - tests/vv_req_net_001.rs::vv_req_net_001_clvm_output_is_deterministic
      - tests/vv_req_net_001.rs::vv_req_net_001_clvm_different_pubkeys_different_output
    notes: "8 source-inspection + 5 CLVM execution. Deserialize .hex, build flat env, run_program(), parse conditions. Verified: loads, executes, 3 conditions (AGG_SIG_ME + 2 CREATE_COIN), recreation amt=1 with INNER_MOD_HASH, deterministic, different pubkeys produce different outputs."

