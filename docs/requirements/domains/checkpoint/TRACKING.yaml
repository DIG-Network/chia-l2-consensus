domain_id: checkpoint
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: CHK-001
    section: "Singleton Identity"
    summary: "Checkpoint singleton is canonical L2 state authority"
    status: verified
    spec_ref: "docs/design/requirements/checkpoint/CHK-001.md"
    tests:
      - tests/vv_req_chk_001_to_007.rs
    notes: "5 tests: hex/hash artifacts exist, puzzle loads into CLVM, is inner puzzle."

  - id: CHK-002
    section: "State Tracking"
    summary: "Track state_root, epoch, validator_merkle_root, validator_count"
    status: verified
    spec_ref: "docs/design/requirements/checkpoint/CHK-002.md"
    tests:
      - tests/vv_req_chk_001_to_007.rs
    notes: "2 tests: source has 4 state params + TREE_DEPTH."

  - id: CHK-003
    section: "Checkpoint Spend Path"
    summary: "Verify Groth16 proof and BLS aggregate signature"
    status: verified
    spec_ref: "docs/design/requirements/checkpoint/CHK-003.md"
    tests:
      - tests/vv_req_chk_003.rs
      - tests/vv_req_chk_008.rs
    notes: "15 tests in chk_003 (scalar verification, VK input, pairing); 13 tests in chk_008 (E2E with real proofs)."

  - id: CHK-004
    section: "Checkpoint Spend Path"
    summary: "Update state, increment epoch, emit announcement"
    status: verified
    spec_ref: "docs/design/requirements/checkpoint/CHK-004.md"
    tests:
      - tests/vv_req_chk_001_to_007.rs
      - tests/vv_req_chk_008.rs
    notes: "1 test in chk_001_to_007 (CLVM checkpoint path produces CREATE_COIN + announcement); verified in chk_008 E2E."

  - id: CHK-005
    section: "Membership Query"
    summary: "Verify Merkle proof and emit membership announcement"
    status: verified
    spec_ref: "docs/design/requirements/checkpoint/CHK-005.md"
    tests:
      - tests/vv_req_chk_001_to_007.rs
    notes: "3 tests: membership query runs at depth=0, announcement cross-impl hash match, non-membership announcement."

  - id: CHK-006
    section: "Membership Query"
    summary: "Permissionless - no signature required"
    status: verified
    spec_ref: "docs/design/requirements/checkpoint/CHK-006.md"
    tests:
      - tests/vv_req_chk_001_to_007.rs
    notes: "1 test: no AGG_SIG_ME/UNSAFE in membership query CLVM output."

  - id: CHK-007
    section: "Verification Key"
    summary: "VK curried in at deployment, immutable"
    status: verified
    spec_ref: "docs/design/requirements/checkpoint/CHK-007.md"
    tests:
      - tests/vv_req_chk_001_to_007.rs
    notes: "2 tests: VK_HASH curried in, included in curry_tree_hash recreation."

  - id: CHK-008
    section: "End-to-End Integration Test"
    summary: "Full lifecycle: deploy, register, checkpoint, exit, collateral recovery"
    status: verified
    spec_ref: "docs/design/requirements/checkpoint/CHK-008.md"
    tests:
      - tests/vv_req_chk_008.rs
    notes: "13 tests: trusted setup, proof generation, VK IC points, pairing check, simulator checkpoint spend, two-epoch E2E, invalid proof rejection, format compatibility."

  - id: CHK-009
    section: "Epoch Binding"
    summary: "Checkpoint message includes epoch; puzzle computes new_epoch internally"
    status: verified
    spec_ref: "docs/requirements/domains/checkpoint/specs/CHK-009.md"
    tests:
      - tests/vv_req_chk_009.rs::vv_req_chk_009_checkpoint_message_includes_epoch
      - tests/vv_req_chk_009.rs::vv_req_chk_009_checkpoint_message_format
      - tests/vv_req_chk_009.rs::vv_req_chk_009_adjacent_epochs_differ
      - tests/vv_req_chk_009.rs::vv_req_chk_009_proof_encodes_epoch
      - tests/vv_req_chk_009.rs::vv_req_chk_009_scalar_s6_changes_with_epoch
      - tests/vv_req_chk_009.rs::vv_req_chk_009_puzzle_computes_epoch_internally
      - tests/vv_req_chk_009.rs::vv_req_chk_009_rue_includes_epoch_in_message
      - tests/vv_req_chk_009.rs::vv_req_chk_009_epoch_0_to_1_valid
      - tests/vv_req_chk_009.rs::vv_req_chk_009_large_epoch
    notes: "Epoch bound via checkpoint_message hash. Puzzle computes new_epoch=old+1 internally. Scalar s6=sha256(msg) changes with epoch. Proofs for different epochs differ."

  - id: CHK-010
    section: "Single Checkpoint Per Epoch"
    summary: "Only one checkpoint per epoch via singleton + epoch binding + BLS"
    status: verified
    spec_ref: "docs/requirements/domains/checkpoint/specs/CHK-010.md"
    tests:
      - tests/vv_req_chk_010.rs::vv_req_chk_010_same_state_different_epochs
      - tests/vv_req_chk_010.rs::vv_req_chk_010_signature_epoch_mismatch
      - tests/vv_req_chk_010.rs::vv_req_chk_010_aggregate_signature_epoch_bound
      - tests/vv_req_chk_010.rs::vv_req_chk_010_signing_message_epoch_chain
      - tests/vv_req_chk_010.rs::vv_req_chk_010_puzzle_creates_new_coin_with_epoch_plus_1
      - tests/vv_req_chk_010.rs::vv_req_chk_010_epoch_increment_exactly_1
      - tests/vv_req_chk_010.rs::vv_req_chk_010_proof_replay_prevention
    notes: "Three-layer enforcement: singleton UTXO (old coin consumed), epoch in checkpoint_message (scalar mismatch), BLS signature binding (different epoch = different message)."

  - id: CHK-011
    section: "State Hash Binding"
    summary: "state_root in checkpoint_message binds proof to specific state"
    status: verified
    spec_ref: "docs/requirements/domains/checkpoint/specs/CHK-011.md"
    tests:
      - tests/vv_req_chk_011.rs::vv_req_chk_011_state_root_is_first_field
      - tests/vv_req_chk_011.rs::vv_req_chk_011_different_state_roots_different_messages
      - tests/vv_req_chk_011.rs::vv_req_chk_011_single_byte_change
      - tests/vv_req_chk_011.rs::vv_req_chk_011_rue_includes_state_root
      - tests/vv_req_chk_011.rs::vv_req_chk_011_same_state_root_for_message_and_recreation
      - tests/vv_req_chk_011.rs::vv_req_chk_011_state_root_changes_scalar
      - tests/vv_req_chk_011.rs::vv_req_chk_011_proof_bound_to_state_root
      - tests/vv_req_chk_011.rs::vv_req_chk_011_zero_state_root_valid
    notes: "state_root is first field of 80-byte preimage. Different roots → different messages → different scalars → different proofs. Rue uses same state_root for message AND recreation."

  - id: CHK-012
    section: "Network ID Binding"
    summary: "network_coin_launcher_id in checkpoint_message prevents cross-network replay"
    status: verified
    spec_ref: "docs/requirements/domains/checkpoint/specs/CHK-012.md"
    tests:
      - tests/vv_req_chk_012.rs::vv_req_chk_012_different_networks_different_messages
      - tests/vv_req_chk_012.rs::vv_req_chk_012_network_id_in_preimage
      - tests/vv_req_chk_012.rs::vv_req_chk_012_proof_bound_to_network
      - tests/vv_req_chk_012.rs::vv_req_chk_012_scalar_changes_with_network
      - tests/vv_req_chk_012.rs::vv_req_chk_012_deterministic
      - tests/vv_req_chk_012.rs::vv_req_chk_012_zero_network_id_valid
      - tests/vv_req_chk_012.rs::vv_req_chk_012_preimage_112_bytes
    notes: "IMPLEMENTED: network_coin_launcher_id added as curried param in checkpoint_inner.rue and 5th arg in compute_checkpoint_message(). Preimage grew from 80→112 bytes."

  - id: CHK-013
    section: "Validator Attestation Binding"
    summary: "Validators sign epoch+network+state; bls_verify + Groth16 prove majority attestation"
    status: verified
    spec_ref: "docs/requirements/domains/checkpoint/specs/CHK-013.md"
    tests:
      - tests/vv_req_chk_013.rs
    notes: "11 VV tests: message includes all 3 fields, signature verifies, changing any field invalidates, multi-validator aggregation, proof bound to message, puzzle recomputes internally, two-check design present, complete attestation flow."
